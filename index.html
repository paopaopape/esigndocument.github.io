<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบอนุมัติเอกสาร | Document Flow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');

:root{
  --navy:#152238;
  --navy-light:#1F3358;
  --navy-lighter:#2A4270;
  --paper:#F3EEE1;
  --paper-white:#FBF8F1;
  --ink:#26241F;
  --ink-soft:#726C5E;
  --stamp-red:#A83A2C;
  --gold:#B8902A;
  --forest:#2E6B4E;
  --line:#E1D8C2;
  --blue:#2E5EAA;
  --purple:#7B4FA0;
  --orange:#BE6C17;
  --pink:#AE4270;
  --radius:9px;
  --shadow: 0 2px 10px rgba(21,34,56,0.10);
}
*{box-sizing:border-box;}
@keyframes busy-spin{ to{ transform:rotate(360deg); } }
body{margin:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans Thai',sans-serif;font-size:14px;}
h1,h2,h3,h4{font-family:'Noto Serif Thai',serif;margin:0;color:var(--navy);}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:13.5px;}
::selection{background:var(--gold);color:#fff;}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(circle at 20% 20%, rgba(184,144,42,0.10), transparent 45%),
  radial-gradient(circle at 80% 80%, rgba(46,94,170,0.08), transparent 45%),
  var(--navy);padding:20px;}
.login-card{background:var(--paper-white);width:100%;max-width:400px;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,0.35);overflow:hidden;}
.login-head{background:var(--navy);color:#fff;padding:28px 30px 22px;position:relative;}
.login-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--stamp-red),var(--forest));}
.login-head .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:#C9A227;text-transform:uppercase;}
.login-head h1{color:#fff;font-size:22px;margin-top:6px;}
.login-body{padding:26px 30px 30px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.field select, .field input, .field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);}
.field textarea{resize:vertical;min-height:60px;}
.field .hint{font-size:11px;color:var(--ink-soft);margin-top:4px;}
.btn{border:none;border-radius:7px;padding:10px 18px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-light);}
.btn-block{width:100%;justify-content:center;padding:12px;}
.login-hint{margin-top:14px;font-size:12px;color:var(--ink-soft);line-height:1.6;background:var(--paper);border:1px dashed var(--line);padding:10px 12px;border-radius:7px;}

/* ---------- LAYOUT ---------- */
.app{display:flex;min-height:100vh;}
.sidebar{width:236px;background:var(--navy);color:#EFE9DA;flex-shrink:0;display:flex;flex-direction:column;}
.sidebar-brand{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-brand .mark{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.12em;}
.sidebar-brand h2{color:#fff;font-size:17px;margin-top:4px;}
.nav{padding:14px 10px;flex:1;overflow-y:auto;}
.nav-group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:#8792A8;padding:14px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;color:#D8D2C1;font-size:13.5px;font-weight:500;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,0.06);cursor:pointer;}
.nav-item.active{background:var(--navy-lighter);color:#fff;}
.nav-item .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;}
.nav-sub{margin-left:14px;padding-left:10px;border-left:1px solid rgba(255,255,255,0.12);}
.nav-sub .nav-item{font-size:12.5px;padding:7px 12px;}
.sidebar-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.08);font-size:11.5px;color:#8792A8;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:var(--paper-white);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:19px;}
.topbar .sub{color:var(--ink-soft);font-size:12.5px;margin-top:2px;}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-chip .avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Noto Serif Thai',serif;}
.user-chip .who{text-align:right;}
.user-chip .who .name{font-weight:600;font-size:13px;}
.user-chip .who .role{font-size:11.5px;color:var(--ink-soft);}
.logout-btn{background:none;border:1px solid var(--line);border-radius:7px;padding:7px 12px;font-size:12px;color:var(--ink-soft);}
.logout-btn:hover{border-color:var(--stamp-red);color:var(--stamp-red);}

.content{padding:26px 28px 60px;overflow-y:auto;}
.card{background:var(--paper-white);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:22px;margin-bottom:20px;}
.card h3{font-size:16px;margin-bottom:14px;}
.table-scroll{overflow-x:auto;}

/* ---------- DASHBOARD ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{background:var(--paper-white);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.stat-card:hover{border-color:var(--ink-soft);}
.stat-card.active{border-color:var(--navy);box-shadow:0 0 0 2px var(--navy) inset,var(--shadow);}
.stat-card .num{font-family:'Noto Serif Thai',serif;font-size:30px;color:var(--navy);font-weight:700;}
.stat-card .lbl{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.stat-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;}
.stat-card.s-accountant::before{background:var(--blue);}
.stat-card.s-reviewer::before{background:var(--orange);}
.stat-card.s-approver::before{background:var(--purple);}
.stat-card.s-finance::before{background:var(--gold);}
.stat-card.s-complete::before{background:var(--forest);}
.stat-card.s-reject::before{background:var(--stamp-red);}
.stat-card.s-cancel::before{background:var(--ink-soft);}

/* ---------- FILTER BAR ---------- */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;padding:14px 16px;background:var(--paper);border:1px solid var(--line);border-radius:10px;}
.filter-bar .f-field{min-width:150px;}
.filter-bar .f-field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:4px;font-weight:600;}
.filter-bar input, .filter-bar select{padding:7px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:12.5px;width:100%;}
.filter-clear{padding:7px 12px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:12px;color:var(--ink-soft);height:33px;}
.filter-clear:hover{border-color:var(--stamp-red);color:var(--stamp-red);}

.company-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:14px 18px;background:var(--navy);border-radius:10px;color:#fff;flex-wrap:wrap;}
.company-header label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#C9A227;font-weight:700;}
.company-header select{padding:8px 12px;border-radius:6px;border:none;font-size:13px;min-width:260px;}

.group-header td{background:var(--navy);color:#fff;font-weight:700;font-size:12.5px;padding:9px 14px;border-radius:6px;}
.group-header .cnt{font-weight:400;color:#C9A227;margin-left:6px;}

/* ---------- TABLE ---------- */
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);padding:9px 10px;border-bottom:2px solid var(--line);white-space:nowrap;}
tbody td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
tbody tr:hover{background:rgba(184,144,42,0.05);}
.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);}
.link-cell a{color:var(--blue);text-decoration:none;font-size:12.5px;}
.link-cell a:hover{text-decoration:underline;}
.empty-row td{text-align:center;padding:36px;color:var(--ink-soft);}
.comment-cell{max-width:220px;font-size:12px;color:var(--ink-soft);}
.sap-cell{font-family:'IBM Plex Mono',monospace;font-size:12px;}
.sap-cell.empty{color:#B9B2A0;}

/* ---------- BADGES / STAMPS ---------- */
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;color:#fff;white-space:nowrap;}
.badge-blue{background:var(--blue);}
.badge-purple{background:var(--purple);}
.badge-orange{background:var(--orange);}
.badge-pink{background:var(--pink);}
.badge-gold{background:var(--gold);}
.badge-forest{background:var(--forest);}
.status-pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;background:#EDE6D2;color:var(--ink);}
.status-pill.complete{background:var(--forest);color:#fff;transform:rotate(-2deg);box-shadow:0 1px 4px rgba(46,107,78,0.4);}
.status-pill.reject{background:var(--stamp-red);color:#fff;}

.trail{display:flex;align-items:center;gap:3px;}
.trail .stg{width:9px;height:9px;border-radius:50%;background:var(--line);border:1px solid #D8CDAE;}
.trail .stg.done{background:var(--forest);border-color:var(--forest);}
.trail .stg.current{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,144,42,0.25);}
.trail .bar{width:14px;height:2px;background:var(--line);}
.trail .bar.done{background:var(--forest);}
.trail-label{font-size:10.5px;color:var(--ink-soft);margin-top:3px;}

/* ---------- FORMS / ACTIONS ---------- */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-grid .full{grid-column:1/-1;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}
.btn-approve{background:var(--forest);color:#fff;border:none;}
.btn-approve:hover{opacity:.9;}
.btn-reject{background:#fff;color:var(--stamp-red);border:1px solid var(--stamp-red);}
.btn-reject:hover{background:rgba(168,58,44,0.08);}
.btn-outline{background:#fff;color:var(--navy);border:1px solid var(--line);}
.btn-outline:hover{border-color:var(--navy);}
.btn-action{background:var(--navy);color:#fff;border:1px solid var(--navy);}
.btn-action:hover{background:var(--navy-light);}
.btn-cancel{background:#fff;color:var(--ink-soft);border:1px solid var(--ink-soft);}
.btn-cancel:hover{background:rgba(114,108,94,0.1);color:var(--ink);border-color:var(--ink);}
.action-row td{background:var(--paper);padding:14px 16px;}
.note-box{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.note-box textarea{flex:1;min-width:220px;min-height:40px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;}
.note-box .sap-input{width:190px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;}
.note-box .sap-wrap label{display:block;font-size:10.5px;color:var(--ink-soft);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}

.icon-btn{background:#fff;border:1px solid var(--line);border-radius:6px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-soft);}
.icon-btn:hover{border-color:var(--navy);color:var(--navy);background:var(--paper);}
.icon-btn.edit-icon{color:var(--gold);border-color:rgba(184,144,42,0.45);}
.icon-btn.edit-icon:hover{background:rgba(184,144,42,0.1);border-color:var(--gold);color:var(--gold);}
.icon-btn.dl-icon{color:var(--purple);border-color:rgba(123,79,160,0.4);}
.icon-btn.dl-icon:hover{background:rgba(123,79,160,0.1);border-color:var(--purple);color:var(--purple);}
.icon-btn.ql-folder{color:var(--blue);border-color:rgba(46,94,170,0.4);}
.icon-btn.ql-folder:hover{background:rgba(46,94,170,0.1);border-color:var(--blue);color:var(--blue);}
.icon-btn.ql-payment{color:var(--forest);border-color:rgba(46,107,78,0.4);}
.icon-btn.ql-payment:hover{background:rgba(46,107,78,0.1);border-color:var(--forest);color:var(--forest);}
.icon-btn.ql-receipt{color:var(--orange);border-color:rgba(190,108,23,0.4);}
.icon-btn.ql-receipt:hover{background:rgba(190,108,23,0.1);border-color:var(--orange);color:var(--orange);}
.icon-btn.ql-wht{color:var(--pink);border-color:rgba(174,66,112,0.4);}
.icon-btn.ql-wht:hover{background:rgba(174,66,112,0.1);border-color:var(--pink);color:var(--pink);}
.icon-btn.sap-link{font-size:9px;font-weight:700;letter-spacing:.2px;color:var(--blue);}
.icon-btn.sap-link:hover{border-color:var(--blue);color:var(--blue);background:var(--paper);}

.tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line);}
.tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;}
.tab:hover{color:var(--navy);cursor:pointer;}
.tab.active{color:var(--navy);border-color:var(--gold);}

.chip-check{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--line);border-radius:20px;font-size:12px;margin:3px 4px 3px 0;background:#fff;}
.chip-check input{margin:0;}

.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;}
.helper{color:var(--ink-soft);font-size:12.5px;margin-top:2px;margin-bottom:16px;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.3);z-index:999;opacity:0;transform:translateY(10px);transition:all .25s;}
.toast.show{opacity:1;transform:translateY(0);}
.role-tag{font-size:10.5px;background:var(--navy);color:#fff;padding:2px 8px;border-radius:20px;}
hr.div{border:none;border-top:1px solid var(--line);margin:18px 0;}
</style>
</head>

<script>

/* Tax Code calculation (accounting): V7 = 7% VAT (Base = Net × 100/107, VAT = Net − Base); VX = no VAT (Base = Net, VAT = 0) */
async function applyTaxCalc(id){
  const taxEl = document.getElementById('taxCode-'+id);
  if(!taxEl) return;
  const taxCode = taxEl.value;
  const netEl = document.getElementById('amt-netAmount-'+id);
  const baseEl = document.getElementById('amt-baseAmount-'+id);
  const vatEl = document.getElementById('amt-vatAmount-'+id);
  const doc = state.documents.find(d=>d.id===id);
  if(!doc) return;
  const patch = { id, taxCode };
  if(taxCode && netEl){
    const net = parseFloat(netEl.value)||0;
    let base, vat;
    if(taxCode==='V7'){
      base = Math.round(net*100/107*100)/100;
      vat = Math.round((net-base)*100)/100;
    } else { // VX — no VAT
      base = net;
      vat = 0;
    }
    if(baseEl) baseEl.value = base.toFixed(2);
    if(vatEl) vatEl.value = vat.toFixed(2);
    patch.baseAmount = base.toFixed(2);
    patch.vatAmount = vat.toFixed(2);
  }
  const res = await apiCall('updateDocument', patch);
  if(!res.success){ showToast('บันทึกการคำนวณไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  Object.assign(doc, patch);
}

function stageRoleForDoc(doc){
  if(doc.status==='รอผู้ตรวจสอบ' || doc.status==='ตีกลับแก้ไข(ผู้อนุมัติ)') return 'reviewer';
  if(doc.status==='รอผู้อนุมัติ') return 'approver';
  return null; // accountant stage (and any other status) is not mapping-restricted
}
function canActOnStage(doc){
  const role = stageRoleForDoc(doc);
  if(!role) return true;
  const mapping = getApprovalMapping(doc.docType, doc.companyCode);
  if(!mapping) return true; // no mapping configured for this type+company -> unrestricted fallback
  const targetId = role==='reviewer' ? mapping.reviewerId : mapping.approverId;
  if(!targetId) return true; // mapping row exists but this slot left unset -> unrestricted fallback
  return isAdmin() || state.user.id === targetId;
}

  const role = stageRoleForDoc(doc);

/* ============================= API (Google Apps Script backend) ============================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbzaVyG1CAbVFaKRt2VXMj9m3Gos3tioxwm5iDpf2DfHs34ZyuOwdc96YPiAiKR3VnRq/exec';

async function apiCall(action, payload){
  try{
    const res = await fetch(API_URL, {
      method:'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight against Apps Script
      body: JSON.stringify({ action, payload: payload||{} }),
    });
    const data = await res.json();
    if(!data.success && data.error) console.warn('API', action, 'returned error:', data.error);
    return data;
  }catch(err){
    console.error('API call failed', action, err);
    showToast('เชื่อมต่อ Server ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ตแล้วลองใหม่');
    return { success:false, error:String(err) };
  }
}
async function refreshData(){
  const data = await apiCall('bootstrap', {});
  if(data && data.success){
    // Google Sheets auto-types numeric-looking company codes (1010, 1160, 4040...) as Numbers.
    // <select> option values are always strings, so without this normalization every strict
    // === comparison against a company code silently fails and dropdowns snap back to "all".
    state.members = (data.members || []).map(m=>{
      if(m.signatureImage===undefined) m.signatureImage='';
      m.companyCodes = (m.companyCodes||[]).map(c=>String(c));
      m.canTrack = (m.canTrack===true || m.canTrack==='TRUE' || m.canTrack==='true');
      return m;
    });
    state.companies = (data.companies || []).map(c=>({ ...c, code:String(c.code) }));
    state.docTypes = data.docTypes || [];
    state.approvalMappings = (data.approvalMappings || []).map(mp=>({ ...mp, companyCode:String(mp.companyCode) }));
    state.appSettings = data.appSettings || {};
    state.vendors = data.vendors || [];
    state.documents = (data.documents || []).map(d=>{
      if(d.docSAP===undefined) d.docSAP='';

      if(d.whtAmount===undefined) d.whtAmount='';

      if(d.skipApprover===undefined) d.skipApprover='';
      if(d.skipFinance===undefined) d.skipFinance='';
      if(d.payType===undefined) d.payType='';
      if(d.cancelledBy===undefined) d.cancelledBy='';
      if(d.cancelledDate===undefined) d.cancelledDate='';
      if(d.cancelNote===undefined) d.cancelNote='';

      if(d.trackAcct1By===undefined) d.trackAcct1By='';

function uploadSapDataForDoc(e, id){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const doc = state.documents.find(d=>d.id===id);
  if(!doc) return;
  const statusEl = document.getElementById('sap-import-status-'+id);
  const sapEl = document.getElementById('sap-'+id);
  const targetSap = (sapEl && sapEl.value.trim()) || doc.docSAP || '';
  if(!targetSap){
    if(statusEl) statusEl.textContent = 'กรุณากรอก Document SAP ก่อนอัปโหลดไฟล์';
    e.target.value = '';
    return;
  }
  if(statusEl) statusEl.textContent = 'กำลังอ่านไฟล์...';
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      if(typeof XLSX === 'undefined'){ if(statusEl) statusEl.textContent='โหลดไลบรารีอ่านไฟล์ไม่สำเร็จ ลองรีเฟรชหน้าเว็บ'; return; }
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const aoa = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      // find the real header row — the file has a title + blank rows before it
      const headerIdx = aoa.findIndex(row => row.some(c => String(c).trim().toLowerCase()==='web doc number'));
      if(headerIdx===-1){ if(statusEl) statusEl.textContent='ไม่พบคอลัมน์ "Web Doc Number" ในไฟล์ กรุณาตรวจสอบไฟล์อีกครั้ง'; return; }
      const header = aoa[headerIdx].map(h=>String(h).trim().toLowerCase());
      const colIdx = name => header.findIndex(h=>h===name);
      const iWebDoc = colIdx('web doc number');
      const iFiDoc = colIdx('fi doc number');
      const iVendor = colIdx('vendor number');
      const iRequester = colIdx('requester name');
      const iVat = colIdx('vat amount');
      const iWht = colIdx('wht amount');
      const iAmount = colIdx('amount');
      const iNet = colIdx('net amount');

      // only keep the rows in this file whose Web Doc Number matches THIS document's Document SAP
      const matchingRows = aoa.slice(headerIdx+1).filter(r=>r[iWebDoc] && String(r[iWebDoc]).trim()===targetSap);
      if(!matchingRows.length){
        if(statusEl) statusEl.textContent = `ไม่พบข้อมูลที่ตรงกับ Document SAP "${targetSap}" ในไฟล์นี้`;
        e.target.value = '';
        return;
      }
      const lines = matchingRows.map(r=>({
        fiDoc: iFiDoc!==-1 ? String(r[iFiDoc]||'').trim() : '',
        vendor: iVendor!==-1 ? String(r[iVendor]||'').trim() : '',
        vendorName: iRequester!==-1 ? String(r[iRequester]||'').trim() : '',
        vat: iVat!==-1 ? (parseFloat(r[iVat])||0) : 0,
        wht: iWht!==-1 ? (parseFloat(r[iWht])||0) : 0,
        base: iAmount!==-1 ? (parseFloat(String(r[iAmount]).replace(/,/g,''))||0) : 0,
        net: iNet!==-1 ? (parseFloat(String(r[iNet]).replace(/,/g,''))||0) : 0,
      }));
      e.target.value = '';
      showSapImportPreview(id, targetSap, lines);
    }catch(err){
      if(statusEl) statusEl.textContent = 'อ่านไฟล์ไม่สำเร็จ: '+err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

async function confirmSapImport(){
  const pending = state.pendingSapImport;
  if(!pending) return;
  const { id, targetSap, lines } = pending;
  const selected = lines.filter((l,i)=>{ const el = document.getElementById('sap-import-chk-'+i); return el ? el.checked : true; });
  if(!selected.length){ showToast('กรุณาติ๊กเลือกอย่างน้อย 1 รายการ'); return; }
  const doc = state.documents.find(d=>d.id===id);
  if(!doc) return;
  const statusEl = document.getElementById('sap-import-status-'+id);
  const sums = selected.reduce((t,l)=>({vat:t.vat+l.vat, wht:t.wht+l.wht, base:t.base+l.base, net:t.net+l.net}), {vat:0,wht:0,base:0,net:0});
  const patch = {
    id, docSAP: targetSap, sapLines: JSON.stringify(selected),
    vatAmount: sums.vat.toFixed(2), whtAmount: sums.wht.toFixed(2), baseAmount: sums.base.toFixed(2), netAmount: sums.net.toFixed(2),
    modifiedBy: fullName(state.user), modifiedDate: nowStr(),
  };
  hideBusyOverlay();
  showBusyOverlay('กำลังนำเข้าข้อมูล SAP กรุณารอสักครู่...');
  const res = await apiCall('updateDocument', patch);
  hideBusyOverlay();
  state.pendingSapImport = null;
  if(!res.success){ if(statusEl) statusEl.textContent = 'บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง'; return; }
  Object.assign(doc, patch);
  if(statusEl) statusEl.textContent = `นำเข้าสำเร็จ ${selected.length} FI Doc`;
  showToast('นำเข้าข้อมูล SAP สำหรับ '+id+' เรียบร้อย ('+selected.length+' FI Doc)');
  render();
}


/* ============================= RENDER: ROOT (focus-preserving) ============================= */
function render(){
  const root = document.getElementById('app');
  const active = document.activeElement;
  const activeId = active && active.id ? active.id : null;
  const selStart = active && typeof active.selectionStart==='number' ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd==='number' ? active.selectionEnd : null;

  if(state.loading){ root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#8792A8;background:var(--navy);font-family:IBM Plex Mono,monospace;font-size:13px;">กำลังโหลดระบบ...</div>'; return; }
  if(!state.user){ root.innerHTML = loginHTML(); return; }
  root.innerHTML = layoutHTML();

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart!=null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selEnd); }catch(e){} }
    }
  }
}

/* ---- Remember-me session (stores only the member id, never the password) ---- */
const SESSION_KEY = 'dfSession';
function saveSession(user){ try{ localStorage.setItem(SESSION_KEY, JSON.stringify({id:user.id})); }catch(e){} }
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} }
function restoreSession(){
  let saved;
  try{ saved = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); }catch(e){ saved = null; }
  if(!saved || !saved.id) return;
  const member = state.members.find(m=>m.id===saved.id);
  if(!member){ clearSession(); return; }
  state.user = member;
  state.view = 'dashboard';
  state.approvalTab = defaultApprovalTab();
}

async function doLogin(e){
  e.preventDefault();
  const submitBtn = e.target.querySelector('button[type=submit]');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'กำลังเข้าสู่ระบบ...'; }
  const f = new FormData(e.target);
  const email = f.get('email').trim().toLowerCase();
  const password = f.get('password').trim();
  const remember = f.get('remember') === 'on';
  const res = await apiCall('login', { email, password });
  if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = 'เข้าสู่ระบบ'; }
  if(!res.success){
    if(res.error === 'not_found'){ showToast('ไม่พบบัญชีนี้ในระบบ กรุณาติดต่อ Admin'); return; }
    if(res.error === 'no_password'){ showToast('บัญชีนี้ยังไม่ได้ตั้งรหัสผ่าน กรุณาตั้งรหัสผ่านก่อน'); state.authEmail = email; state.authView='set-password'; render(); return; }
    showToast('อีเมลหรือรหัสผ่านไม่ถูกต้อง'); return;
  }
  state.user = res.user;
  state.view = 'dashboard';
  state.approvalTab = defaultApprovalTab();
  await refreshData();
  // keep the freshly-logged-in user object (refreshData rebuilds state.members, so re-point state.user at the matching record)
  const refreshedUser = state.members.find(m=>m.id===res.user.id);
  if(refreshedUser) state.user = refreshedUser;
  if(remember){ saveSession(state.user); } else { clearSession(); }
  render();
}
async function doSetPassword(e){
  e.preventDefault();
  const submitBtn = e.target.querySelector('button[type=submit]');
  const f = new FormData(e.target);
  const email = f.get('email').trim().toLowerCase();
  const pw = f.get('password').trim();
  const confirm = f.get('confirm').trim();
  if(pw.length < 6){ showToast('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
  if(pw !== confirm){ showToast('รหัสผ่านที่กรอกไม่ตรงกัน'); return; }
  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'กำลังบันทึก...'; }
  const res = await apiCall('setPassword', { email, password: pw });
  if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = 'บันทึกรหัสผ่าน'; }
  if(!res.success){
    if(res.error === 'not_found'){ showToast('ไม่พบอีเมลนี้ในระบบ กรุณาให้ Admin เพิ่ม Member ก่อน'); return; }
    showToast('ตั้งรหัสผ่านไม่สำเร็จ ลองใหม่อีกครั้ง'); return;
  }
  showToast('ตั้งรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบ');
  state.authView = 'login'; state.authEmail = '';
  render();
}

/* ============================= STAMP TRAIL ============================= */
function trailHTML(doc){
  if(doc.status === 'Complete'){
    return `<span class="status-pill complete">✓ Complete</span>`;
  }
  if(doc.status.startsWith('ตีกลับ')){
    return `<span class="status-pill reject">↺ ${doc.status}</span>`;
  }
  const idx = STAGES.findIndex(s=>s.status===doc.status);
  const dots = STAGES.map((s,i)=>{
    const cls = i<idx ? 'done' : (i===idx ? 'current' : '');
    const bar = i>0 ? `<span class="bar ${i-1<idx?'done':''}"></span>` : '';
    return bar + `<span class="stg ${cls}" title="${s.label}"></span>`;
  }).join('');
  return `<div><div class="trail">${dots}</div><div class="trail-label">รอ${STAGES[idx] ? STAGES[idx].label : ''}</div></div>`;
}

function groupByDue(list){
  const map = {};
  list.forEach(d=>{
    const key = d.dueDate || 'ไม่ระบุ';
    if(!map[key]) map[key] = [];
    map[key].push(d);
  });
  return Object.keys(map).sort().map(key=>({due:key, items:map[key]}));
}

function gotoDashPage(p){ state.dashPage = p; render(); }
function paginationHTML(current, total, fnName){
  if(total<=1) return '';
  const seq = [1];
  if(current>3) seq.push('...');
  for(let p=Math.max(2,current-1); p<=Math.min(total-1,current+1); p++) seq.push(p);
  if(current<total-2) seq.push('...');
  if(total>1) seq.push(total);
  const btn = (label, page, disabled, active) => `<button class="btn btn-sm ${active?'btn-action':'btn-outline'}" ${disabled?'disabled':''} onclick="${fnName}(${page})" style="min-width:32px;padding:4px 8px;">${label}</button>`;
  const items = [btn('‹', current-1, current<=1, false)];
  seq.forEach(p=>{
    if(p==='...') items.push(`<span style="padding:0 4px;color:var(--ink-soft);">…</span>`);
    else items.push(btn(p, p, false, p===current));
  });
  items.push(btn('›', current+1, current>=total, false));
  return `<div style="display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap;">${items.join('')}</div>`;
}

async function submitNewDoc(e){
  e.preventDefault();
  const submitBtn = e.target.querySelector('button[type=submit]');
  if(submitBtn && submitBtn.disabled) return;
  const f = new FormData(e.target);
  const docName = f.get('docName');
  const companyCode = f.get('companyCode');
  const createdBy = fullName(state.user);

  // client-side check against the cached document list — catches near-duplicates regardless of
  // how far apart in time they're submitted (the server-side check only guards a short window)
  const dupe = state.documents.find(d=>
    String(d.docName||'').trim().toLowerCase()===String(docName||'').trim().toLowerCase() &&
    String(d.companyCode||'')===String(companyCode||'') &&
    String(d.createdBy||'')===createdBy
  );
  if(dupe){
    const proceed = confirm('พบว่ามีเอกสารชื่อเดียวกันนี้วางบิลไว้แล้ว (ID: '+dupe.id+')\nต้องการวางบิลซ้ำอีกครั้งจริงหรือไม่?');
    if(!proceed) return;
  }

  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'กำลังส่ง...'; }
  showBusyOverlay('กำลังบันทึกวางบิล กรุณารอสักครู่...');
  const payload = {
    docType: f.get('docType'), docName, comment: f.get('comment')||'',
    dueDate: f.get('dueDate'), linkFile: f.get('linkFile'), companyCode,
    vendor: f.get('vendor')||'', vendorName: f.get('vendorName')||'',
    netAmount: f.get('netAmount')||'',
    createdBy, createdDate: new Date().toISOString().slice(0,10),
  };
  const res = await apiCall('addDocument', payload);
  hideBusyOverlay();
  if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = 'ส่งเข้าสู่กระบวนการอนุมัติ'; }
  if(!res.success){
    if(res.error === 'duplicate_submission'){
      const idText = res.duplicateId ? ' อ้างอิง ID เลขที่ '+res.duplicateId : '';

/* ============================= TRACKING INVOICE ============================= */
/* Physical-document receipt tracking — fully independent of the digital approval flow.
   3 independent checkpoints (any order, any subset): ธุรการ, นักบัญชีคนที่1, นักบัญชีคนที่2.
   "รับครบ" = both accountant checkpoints stamped; the clerk checkpoint is optional/supplementary. */
function canEditTracking(){ return isAdmin() || state.user.canTrack===true; }
function canTrackDoc(doc, stage){
  if(isAdmin()) return true;
  if(state.user.canTrack!==true) return false;
  if(state.user.companyCodes && state.user.companyCodes.length){
    if(!state.user.companyCodes.includes(doc.companyCode)) return false;
  }
  // Per-checkpoint role restriction: ธุรการ can only tick the ธุรการ checkpoint, นักบัญชี can only
  // tick the 2 นักบัญชี checkpoints — prevents ticking across roles. Any other role granted canTrack
  // (e.g. User) keeps unrestricted access to all 3 checkpoints, same as before this change.
  if(stage){
    if(state.user.role==='ธุรการ' && stage!=='clerk') return false;
    if(state.user.role==='นักบัญชี' && stage!=='acct1' && stage!=='acct2') return false;
  }
  return true;
}
function trackingStatusOf(d){
  const complete = !!(d.trackAcct1By && d.trackAcct2By);
  if(complete) return 'complete';
  const any = !!(d.trackClerkBy || d.trackAcct1By || d.trackAcct2By);
  return any ? 'partial' : 'none';
}
function trackingHTML(){
  const canEdit = canEditTracking();
  const companyOpts = userCompanyOptions();
  const companyHeader = `
  <div class="company-header">
    <label>บริษัท</label>
    <select onchange="setTrackingCompany(this.value)">
      <option value="all" ${state.trackingCompany==='all'?'selected':''}>ทุกบริษัท</option>
      ${companyOpts.map(c=>`<option value="${c.code}" ${state.trackingCompany===c.code?'selected':''}>${c.code} — ${c.name}</option>`).join('')}
    </select>
    <span style="font-size:11.5px;color:#C9C2AC;">เลือกบริษัทเพื่อดูเอกสารทีละบริษัท</span>
  </div>`;

  let scoped = state.documents.filter(d=>d.status!=='ยกเลิก'); // cancelled/duplicate docs don't need physical-receipt tracking
  const cancelledCount = state.documents.filter(d=>d.status==='ยกเลิก').length;
  if(state.user.role==='User'){
    scoped = scoped.filter(d=>d.createdBy===fullName(state.user));
  } else if(!isAdmin() && state.user.companyCodes && state.user.companyCodes.length){
    scoped = scoped.filter(d=>state.user.companyCodes.includes(d.companyCode));
  }
  if(state.trackingCompany!=='all') scoped = scoped.filter(d=>d.companyCode===state.trackingCompany);

  const s = state.trackingSearch;
  const counts = { none:0, partial:0, complete:0 };
  scoped.forEach(d=>{ counts[trackingStatusOf(d)]++; });
  const cardDef = (key, statusVal, label, cls) => {
    const active = s.status === statusVal;
    return `<div class="stat-card ${cls} ${active?'active':''}" role="button" tabindex="0" onclick="setTrackingStatusFilter('${statusVal}')"><div class="num">${counts[key]}</div><div class="lbl">${label}</div></div>`;
  };
  const statCards = `
  <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);">
    ${cardDef('none','none','ยังไม่ได้รับเอกสาร','s-reject')}
    ${cardDef('partial','partial','รับบางส่วน','s-finance')}
    ${cardDef('complete','complete','รับครบแล้ว','s-complete')}
  </div>`;

  let list = scoped.slice();
  if(s.type) list = list.filter(d=>d.docType===s.type);
  if(s.name && s.name.trim()) list = list.filter(d=>d.docName.toLowerCase().includes(s.name.trim().toLowerCase()));
  if(s.createdBy && s.createdBy.trim()) list = list.filter(d=>d.createdBy.toLowerCase().includes(s.createdBy.trim().toLowerCase()));
  if(s.status) list = list.filter(d=>trackingStatusOf(d)===s.status);
  if(s.from){ const from = new Date(s.from); list = list.filter(d=>{ const dt = parseThaiDateStr(d.createdDate) || (d.createdDate?new Date(d.createdDate):null); return dt && dt >= from; }); }
  if(s.to){ const to = new Date(s.to); to.setHours(23,59,59,999); list = list.filter(d=>{ const dt = parseThaiDateStr(d.createdDate) || (d.createdDate?new Date(d.createdDate):null); return dt && dt <= to; }); }
  list.sort((a,b)=>(b.createdDate||'').localeCompare(a.createdDate||''));

  const filterBar = `
  <div class="filter-bar">
    <div class="f-field"><label>ประเภทเอกสาร</label><select id="track-f-type" onchange="setTrackingSearch('type', this.value)">${docTypeSelectOptions(s.type)}</select></div>
    <div class="f-field" style="flex:1;min-width:180px;"><label>ชื่อเอกสาร</label><input id="track-f-name" type="text" placeholder="ค้นหาชื่อเอกสาร..." value="${s.name}" oninput="setTrackingSearch('name', this.value)"></div>
    <div class="f-field"><label>สร้างโดย</label><input id="track-f-created" type="text" placeholder="ชื่อผู้สร้าง..." value="${s.createdBy}" oninput="setTrackingSearch('createdBy', this.value)"></div>
    <div class="f-field"><label>จากวันที่สร้าง</label><input id="track-f-from" type="date" value="${s.from}" onchange="setTrackingSearch('from', this.value)"></div>
    <div class="f-field"><label>ถึงวันที่สร้าง</label><input id="track-f-to" type="date" value="${s.to}" onchange="setTrackingSearch('to', this.value)"></div>
    <button class="filter-clear" onclick="clearTrackingSearch()">ล้างตัวกรอง</button>
  </div>`;

  const rows = list.length ? list.map(d=>{
    const complete = trackingStatusOf(d)==='complete';
    return `
    <tr>
      <td class="mono">${d.id}</td>
      <td><span class="badge badge-${docTypeInfo(d.docType).color}">${docTypeInfo(d.docType).label}</span></td>
      <td>${d.docName}</td>
      <td>${d.createdBy}</td>
      <td>${fmtDate(d.createdDate)}</td>
      <td>${trackStampCell(d,'trackClerkBy','trackClerkDate','trackClerkNote','ธุรการ','clerk')}</td>
      <td>${trackStampCell(d,'trackAcct1By','trackAcct1Date','trackAcct1Note','นักบัญชี #1','acct1')}</td>
      <td>${trackStampCell(d,'trackAcct2By','trackAcct2Date','trackAcct2Note','นักบัญชี #2','acct2')}</td>
      <td>${complete ? '<span class="badge badge-forest">รับครบแล้ว</span>' : '<span class="badge badge-gold">รอรับเอกสาร</span>'}</td>
    </tr>`;
  }).join('') : `<tr class="empty-row"><td colspan="9">ไม่พบเอกสาร</td></tr>`;

  return `
  ${companyHeader}
  <div class="card">
    <div class="eyebrow">Tracking Invoice</div>
    <h3 style="margin-top:4px;">ติดตามการรับเอกสารตัวจริง (${list.length})</h3>
    <div class="helper">ติ๊กรับเมื่อได้รับเอกสารตัวจริงจาก user — ไม่จำเป็นต้องผ่านธุรการก่อนก็ได้ (ข้ามไปติ๊กนักบัญชีคนที่ 1 ตรงได้เลย) ถือว่า "รับครบ" เมื่อนักบัญชีคนที่ 1 และคนที่ 2 ติ๊กรับทั้งคู่${canEdit?'':' — บัญชีของคุณดูได้อย่างเดียว'}${cancelledCount ? ` · เอกสารที่ถูกยกเลิกแล้ว ${cancelledCount} รายการ ถูกซ่อนจากรายการนี้ (ไม่ต้องติ๊กรับ)` : ''}</div>
    <hr class="div">
    ${statCards}
    ${filterBar}
    <div class="table-scroll">
    <table>
      <thead><tr><th>ID</th><th>ประเภท</th><th>ชื่อเอกสาร</th><th>สร้างโดย</th><th>วันที่สร้าง</th><th>ธุรการ</th><th>นักบัญชี #1</th><th>นักบัญชี #2</th><th>สถานะรับเอกสาร</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div>`;
}
function trackStampCell(d, byField, dateField, noteField, label, stage){
  const canEdit = canTrackDoc(d, stage);
  const noteBox = canEdit
    ? `<input type="text" class="sap-input" style="width:130px;font-size:11px;margin-top:4px;" placeholder="โน้ต (ถ้ามี)" value="${d[noteField]||''}" onchange="saveTrackNote('${d.id}','${noteField}',this.value)">`
    : (d[noteField] ? `<div style="font-size:11px;color:var(--ink-soft);margin-top:4px;">📝 ${d[noteField]}</div>` : '');
  if(d[byField]){
    return `
      <div style="white-space:nowrap;">
        <div style="display:flex;align-items:center;gap:4px;">
          <span class="badge badge-forest" title="${d[byField]} · ${d[dateField]||''}">✓ ${d[byField]}</span>
          ${canEdit ? `<button class="icon-btn" style="width:22px;height:22px;" title="ยกเลิกรับเอกสาร" onclick="toggleTrackReceipt('${d.id}','${stage}')">✕</button>` : ''}
        </div>
        <div style="font-size:10.5px;color:var(--ink-soft);margin-top:2px;">${d[dateField]||''}</div>
        ${noteBox}
      </div>`;
  }
  return `
    <div style="white-space:nowrap;">
      ${canEdit ? `<button class="btn btn-sm btn-outline" onclick="toggleTrackReceipt('${d.id}','${stage}')">☐ รับ${label}</button>` : `<span style="color:var(--ink-soft);font-size:12px;">ยังไม่รับ</span>`}
      ${noteBox}
    </div>`;
}
function setTrackingCompany(v){ state.trackingCompany = v; render(); }
function setTrackingSearch(field, val){ state.trackingSearch[field] = val; render(); }
function setTrackingStatusFilter(val){ state.trackingSearch.status = state.trackingSearch.status===val ? '' : val; render(); }
function clearTrackingSearch(){ state.trackingSearch = {type:'', name:'', createdBy:'', from:'', to:'', status:''}; render(); }
async function saveTrackNote(id, field, value){
  const doc = state.documents.find(d=>d.id===id);
  if(!doc) return;
  const stageOfField = { trackClerkNote:'clerk', trackAcct1Note:'acct1', trackAcct2Note:'acct2' }[field];
  if(!canTrackDoc(doc, stageOfField)){ showToast('คุณไม่มีสิทธิ์แก้ไขรายการนี้'); return; }
  const patch = { id, [field]: value };
  const res = await apiCall('updateDocument', patch);
  if(!res.success){ showToast('บันทึกโน้ตไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  doc[field] = value;
}
async function toggleTrackReceipt(id, stage){
  const doc = state.documents.find(d=>d.id===id);
  if(!doc) return;
  if(!canTrackDoc(doc, stage)){ showToast('คุณไม่มีสิทธิ์ติ๊กรับเอกสารนี้'); return; }
  const fieldMap = {
    clerk: ['trackClerkBy','trackClerkDate'],
    acct1: ['trackAcct1By','trackAcct1Date'],
    acct2: ['trackAcct2By','trackAcct2Date'],
  };
  const pair = fieldMap[stage];
  if(!pair) return;
  const [byField, dateField] = pair;
  const wasReceived = !!doc[byField];
  const patch = { id };
  patch[byField] = wasReceived ? '' : fullName(state.user);
  patch[dateField] = wasReceived ? '' : nowStr();
  const res = await apiCall('updateDocument', patch);
  if(!res.success){ showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  Object.assign(doc, patch);
  showToast(wasReceived ? 'ยกเลิกการรับเอกสารแล้ว' : 'บันทึกรับเอกสารเรียบร้อย');
  render();
}

async function processStage(id, decision){
  const doc = state.documents.find(d=>d.id===id);
  if(!doc) return;
  if(!canActOnStage(doc)){ showToast('เอกสารนี้ถูกมอบหมายให้ผู้อื่นดำเนินการ คุณไม่มีสิทธิ์ทำรายการนี้'); return; }
  const noteEl = document.getElementById('note-'+id);
  const note = noteEl ? noteEl.value : '';
  const sapEl = document.getElementById('sap-'+id);
  const vendorEl = document.getElementById('vendor-'+id);
  const vendorNameEl = document.getElementById('vendorName-'+id);
  const skipApproverEl = document.getElementById('skipApprover-'+id);
  const skipFinanceEl = document.getElementById('skipFinance-'+id);
  const skipApprover = skipApproverEl ? skipApproverEl.checked : (doc.skipApprover==='TRUE'||doc.skipApprover===true);
  const skipFinance = skipFinanceEl ? skipFinanceEl.checked : (doc.skipFinance==='TRUE'||doc.skipFinance===true);
  const payTypeEl = document.querySelector('input[name="payType-'+id+'"]:checked');

  // mandatory fields before the accountant can forward a document on to the reviewer
  if(decision==='approve' && doc.status==='รอนักบัญชี'){
    const sapVal = sapEl ? sapEl.value.trim() : (doc.docSAP||'');
    const vendorVal = vendorEl ? vendorEl.value.trim() : (doc.vendor||'');
    const vendorNameVal = vendorNameEl ? vendorNameEl.value.trim() : (doc.vendorName||'');
    const missing = [];
    if(!sapVal) missing.push('Document SAP');
    if(!vendorVal) missing.push('Vendor');
    if(!vendorNameVal) missing.push('Vendor Name');
    if(!payTypeEl) missing.push('ประเภทการจ่าย');
    if(missing.length){ showToast('กรุณากรอกให้ครบก่อนส่งต่อผู้ตรวจสอบ: '+missing.join(', ')); return; }
  }

  const cfg = {
    'รอนักบัญชี': {actor:'accountantBy', date:'accountantDate', note:'accountantNote', reject:'ตีกลับแก้ไข(นักบัญชี)'},
    'รอผู้ตรวจสอบ': {actor:'reviewerBy', date:'reviewerDate', note:'reviewerNote', reject:'ตีกลับแก้ไข(ผู้ตรวจสอบ)'},
    'รอผู้อนุมัติ': {actor:'approverBy', date:'approverDate', note:'approverNote', reject:'ตีกลับแก้ไข(ผู้อนุมัติ)'},
  }[doc.status];
  if(!cfg) return;
  const patch = { id, modifiedBy: fullName(state.user), modifiedDate: nowStr() };
  patch[cfg.actor] = fullName(state.user);
  patch[cfg.date] = nowStr();
  patch[cfg.note] = note;
  if(sapEl){ patch.docSAP = sapEl.value.trim(); }
  if(vendorEl){ patch.vendor = vendorEl.value.trim(); }
  if(vendorNameEl){ patch.vendorName = vendorNameEl.value.trim(); }
  // only write the flags back when their checkbox was actually shown on this form (accountant/reviewer stage),
  // so the approver stage (which has no checkboxes) never overwrites what was decided earlier
  if(skipApproverEl) patch.skipApprover = skipApprover ? 'TRUE' : '';
  if(skipFinanceEl) patch.skipFinance = skipFinance ? 'TRUE' : '';
  if(payTypeEl) patch.payType = payTypeEl.value;

  if(decision!=='approve'){
    patch.status = cfg.reject;
  } else if(doc.status==='รอนักบัญชี'){
    patch.status = 'รอผู้ตรวจสอบ';
  } else if(doc.status==='รอผู้ตรวจสอบ'){
    patch.status = skipApprover ? (skipFinance ? 'Complete' : 'รอชำระเงิน') : 'รอผู้อนุมัติ';
  } else if(doc.status==='รอผู้อนุมัติ'){
    patch.status = skipFinance ? 'Complete' : 'รอชำระเงิน';
  }

  const res = await apiCall('updateDocument', patch);
  if(!res.success){ showToast('ดำเนินการไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  state.expandedRow = null;
  showToast(decision==='approve' ? 'ส่งต่อเอกสารเรียบร้อย' : 'ตีกลับเอกสารแล้ว');
  await refreshData();
  render();
}
async function resubmitFromStage(id){
  const doc = state.documents.find(d=>d.id===id);
  if(!doc) return;
  if(!canActOnStage(doc)){ showToast('เอกสารนี้ถูกมอบหมายให้ผู้อื่นดำเนินการ คุณไม่มีสิทธิ์ทำรายการนี้'); return; }
  const cfg = RESUBMIT_CFG[doc.status];
  if(!cfg) return;
  const noteEl = document.getElementById('note-'+id);
  const sapEl = document.getElementById('sap-'+id);
  const vendorEl = document.getElementById('vendor-'+id);
  const vendorNameEl = document.getElementById('vendorName-'+id);
  const skipApproverEl = document.getElementById('skipApprover-'+id);
  const skipFinanceEl = document.getElementById('skipFinance-'+id);
  const payTypeEl = document.querySelector('input[name="payType-'+id+'"]:checked');

  // same mandatory-fields gate as the normal accountant → reviewer forward
  if(cfg.next==='รอผู้ตรวจสอบ'){
    const sapVal = sapEl ? sapEl.value.trim() : (doc.docSAP||'');
    const vendorVal = vendorEl ? vendorEl.value.trim() : (doc.vendor||'');
    const vendorNameVal = vendorNameEl ? vendorNameEl.value.trim() : (doc.vendorName||'');
    const missing = [];
    if(!sapVal) missing.push('Document SAP');
    if(!vendorVal) missing.push('Vendor');
    if(!vendorNameVal) missing.push('Vendor Name');
    if(!payTypeEl) missing.push('ประเภทการจ่าย');
    if(missing.length){ showToast('กรุณากรอกให้ครบก่อนส่งต่อผู้ตรวจสอบ: '+missing.join(', ')); return; }
  }

  const patch = { id, modifiedBy: fullName(state.user), modifiedDate: nowStr(), status: cfg.next };
  patch[cfg.actor] = fullName(state.user);
  patch[cfg.date] = nowStr();
  if(noteEl && noteEl.value.trim()) patch[cfg.note] = noteEl.value.trim();
  if(sapEl) patch.docSAP = sapEl.value.trim();
  if(vendorEl) patch.vendor = vendorEl.value.trim();
  if(vendorNameEl) patch.vendorName = vendorNameEl.value.trim();
  if(skipApproverEl) patch.skipApprover = skipApproverEl.checked ? 'TRUE' : '';
  if(skipFinanceEl) patch.skipFinance = skipFinanceEl.checked ? 'TRUE' : '';
  if(payTypeEl) patch.payType = payTypeEl.value;
  const res = await apiCall('updateDocument', patch);
  if(!res.success){ showToast('ดำเนินการไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  state.expandedRow = null;
  showToast('ส่งเอกสารกลับเข้าสู่การอนุมัติเรียบร้อย · '+id);
  await refreshData();
  render();
}
async function forwardToSubmitter(id){
  const doc = state.documents.find(d=>d.id===id);
  if(doc && !canActOnStage(doc)){ showToast('เอกสารนี้ถูกมอบหมายให้ผู้อื่นดำเนินการ คุณไม่มีสิทธิ์ทำรายการนี้'); return; }
  const noteEl = document.getElementById('note-'+id);
  const patch = { id, status:'ตีกลับแก้ไข(นักบัญชี)', modifiedBy: fullName(state.user), modifiedDate: nowStr() };
  if(noteEl && noteEl.value.trim()) patch.accountantNote = noteEl.value.trim();
  const res = await apiCall('updateDocument', patch);
  if(!res.success){ showToast('ดำเนินการไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  state.expandedRow = null;
  showToast('ส่งกลับให้ผู้วางบิลแก้ไขแล้ว · '+id);
  await refreshData();
  render();
}
async function cancelDoc(id){
  const doc = state.documents.find(d=>d.id===id);
  if(!doc) return;
  if(!canActOnStage(doc)){ showToast('เอกสารนี้ถูกมอบหมายให้ผู้อื่นดำเนินการ คุณไม่มีสิทธิ์ทำรายการนี้'); return; }
  const confirmed = confirm('ยืนยันยกเลิกเอกสาร '+id+' ใช่หรือไม่?\nเอกสารจะถูกปิดถาวร ไม่สามารถส่งต่อหรือแก้ไขต่อได้อีก (เหมาะกับเอกสารที่คีย์ซ้ำหรือผิดพลาด)');
  if(!confirmed) return;
  const noteEl = document.getElementById('note-'+id);
  const note = noteEl ? noteEl.value.trim() : '';
  const patch = {
    id, status:'ยกเลิก',
    cancelledBy: fullName(state.user), cancelledDate: nowStr(), cancelNote: note,
    modifiedBy: fullName(state.user), modifiedDate: nowStr(),
  };
  const res = await apiCall('updateDocument', patch);
  if(!res.success){ showToast('ยกเลิกเอกสารไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  state.expandedRow = null;
  showToast('ยกเลิกเอกสาร '+id+' เรียบร้อย');
  await refreshData();
  render();
}

// paymentDate / accountantDate etc are stored via nowStr() = Date#toLocaleString('th-TH'),
// e.g. "14/7/2569 00:35:42" — day/month/BuddhistYear. Parse back to a real Date for range filtering.
function parseThaiDateStr(str){
  if(!str) return null;
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(!m) return null;
  const day = parseInt(m[1],10), month = parseInt(m[2],10), buddhistYear = parseInt(m[3],10);
  const d = new Date(buddhistYear-543, month-1, day);
  return isNaN(d.getTime()) ? null : d;
}

async function saveBatchEdit(e, oldDocPayment){
  e.preventDefault();
  const f = new FormData(e.target);
  const newDocPayment = f.get('docPayment').trim();
  const newLink = f.get('docPaymentLink').trim();
  if(!newDocPayment){ showToast('กรุณาระบุเลข Doc Payment'); return; }
  const docs = state.documents.filter(d=>String(d.docPayment)===String(oldDocPayment));
  if(!docs.length){ showToast('ไม่พบเอกสารของ Doc Payment นี้'); return; }
  showBusyOverlay('กำลังบันทึกการแก้ไข กรุณารอสักครู่...');
  for(const doc of docs){
    const patch = {
      id: doc.id, docPayment: newDocPayment, docPaymentLink: newLink,
      modifiedBy: fullName(state.user), modifiedDate: nowStr(),
    };
    const res = await apiCall('updateDocument', patch);
    if(!res.success){ hideBusyOverlay(); showToast('บันทึกไม่สำเร็จที่เอกสาร '+doc.id+' ลองใหม่อีกครั้ง'); await refreshData(); render(); return; }
  }
  hideBusyOverlay();
  showToast('แก้ไข Doc Payment เรียบร้อย');
  state.paymentHistoryEditId = null;
  await refreshData();
  render();
}

  const position = f.get('position'), email = f.get('email'), phone = f.get('phone')||'';

async function savePermission(e, id){
  e.preventDefault();

  const canTrack = f.get('canTrack') === 'on';

  if(!res.success){ showToast('บันทึกสิทธิ์ไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }

}

/* ---- Signature image upload (compressed client-side to keep the Sheet cell small) ---- */
function uploadMemberSignature(e, id){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = async function(){
      const maxW = 300;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(img.width*scale));
      canvas.height = Math.max(1, Math.round(img.height*scale));
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.75); // JPEG keeps the base64 small enough for a Sheets cell
      const res = await apiCall('saveMemberSignature', { id, signatureImage: dataUrl });
      if(!res.success){ showToast('บันทึกลายเซ็นไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
      const m = state.members.find(x=>x.id===id);

    };

  };
  reader.readAsDataURL(file);
}
async function removeMemberSignature(id){

function uploadVendorFile(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('vendor-upload-status');
  if(statusEl) statusEl.textContent = 'กำลังอ่านไฟล์...';
  const reader = new FileReader();
  reader.onload = async function(ev){
    try{
      if(typeof XLSX === 'undefined'){ if(statusEl) statusEl.textContent='โหลดไลบรารีอ่านไฟล์ไม่สำเร็จ ลองรีเฟรชหน้าเว็บ'; return; }
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const aoa = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      if(!aoa.length){ if(statusEl) statusEl.textContent='ไฟล์ว่างเปล่า'; return; }
      const header = aoa[0].map(h=>String(h).trim().toLowerCase());
      const findCol = names => header.findIndex(h=>names.some(n=>h.includes(n)));
      const codeIdx = findCol(['vendor code','vendor','รหัส']);
      const nameIdx = findCol(['vendor name','ชื่อ']);
      const bankIdx = findCol(['เลขที่บัญชี','bankaccount','account']);
      const bankNameIdx = findCol(['bankname','ธนาคาร']);
      if(codeIdx===-1 || nameIdx===-1){ if(statusEl) statusEl.textContent='ไม่พบคอลัมน์ Vendor / Vendor Name ในไฟล์ กรุณาตรวจสอบหัวคอลัมน์'; return; }
      const rows = aoa.slice(1)
        .filter(r=>r[codeIdx] && String(r[codeIdx]).trim())
        .map(r=>({
          vendorCode: String(r[codeIdx]).trim(),
          vendorName: String(r[nameIdx]||'').trim(),
          bankAccount: bankIdx!==-1 ? String(r[bankIdx]||'').trim() : '',
          bankName: bankNameIdx!==-1 ? String(r[bankNameIdx]||'').trim() : '',
        }));
      if(!rows.length){ if(statusEl) statusEl.textContent='ไม่พบข้อมูล Vendor ในไฟล์'; return; }
      showBusyOverlay('กำลังอัปโหลด Vendor Master ('+rows.length+' รายการ) กรุณารอสักครู่...');
      const res = await apiCall('bulkUploadVendors', { rows, createdBy: fullName(state.user) });
      hideBusyOverlay();
      if(!res.success){ if(statusEl) statusEl.textContent='อัปโหลดไม่สำเร็จ ลองใหม่อีกครั้ง'; return; }
      if(statusEl) statusEl.textContent = 'อัปโหลดสำเร็จ '+rows.length+' รายการ';
      showToast('อัปโหลด Vendor Master เรียบร้อย ('+rows.length+' รายการ)');
      e.target.value = '';
      await refreshData();
      render();
    }catch(err){
      if(statusEl) statusEl.textContent = 'อ่านไฟล์ไม่สำเร็จ: '+err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}
